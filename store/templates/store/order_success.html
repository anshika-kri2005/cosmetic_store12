<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#fff0f6,#fde2ea);
            font-family: 'Segoe UI', sans-serif;
        }

        .success-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: auto;
            margin-top: 100px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(255,105,135,0.2);
        }

        .check-icon {
            font-size: 70px;
            color: #28a745;
        }

        .btn-home {
            background: linear-gradient(to right,#ff4d88,#ff1a66);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .btn-home:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="success-box">

    <div class="check-icon">&#10003;</div>

    <h2 class="mt-3" style="color:#ff1a66;">Order Placed Successfully!</h2>

    <p class="text-muted mt-2">
        Thank you for shopping with us.<br>
        Your order has been placed successfully.
    </p>

    <hr>

    <p><strong>Payment Method:</strong> {{ order.get_payment_method_display }}</p>
    <p><strong>Payment Status:</strong> {{ order.get_payment_status_display }}</p>
    <p><strong>Estimated Delivery:</strong> 3-5 Days</p>

    <a href="{% url 'track_order' order.id %}" class="btn btn-success mt-3 w-100">
        Track Your Order
    </a>

    <a href="{% url 'home' %}" class="btn btn-home w-100">
        Continue Shopping
    </a>

</div>

</body>
</html>
