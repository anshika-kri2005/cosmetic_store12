<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | BeautyHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  min-height:100vh;
  background: linear-gradient(120deg,#ff9a9e,#fad0c4,#fbc2eb);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Poppins',sans-serif;
}

.auth-card{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.95);
  border-radius:22px;
  padding:35px;
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

.brand{
  text-align:center;
  font-size:28px;
  font-weight:700;
  color:#d63384;
}

.sub{
  text-align:center;
  color:#777;
  margin-bottom:25px;
}

.form-group{
  position:relative;
  margin-bottom:22px;
}

.form-group i{
  position:absolute;
  top:50%;
  left:14px;
  transform:translateY(-50%);
  color:#d63384;
}

.form-group input{
  width:100%;
  padding:12px 14px 12px 42px;
  border-radius:14px;
  border:1px solid #ddd;
  outline:none;
  font-size:15px;
}

.form-group input:focus{
  border-color:#d63384;
  box-shadow:0 0 0 3px rgba(214,51,132,.15);
}

.form-group label{
  position:absolute;
  left:42px;
  top:50%;
  transform:translateY(-50%);
  background:#fff;
  padding:0 6px;
  color:#999;
  pointer-events:none;
  transition:.3s;
}

.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label{
  top:-8px;
  font-size:12px;
  color:#d63384;
}

.btn-beauty{
  background:linear-gradient(90deg,#d63384,#f783ac);
  color:#fff;
  border:none;
  padding:12px;
  font-weight:600;
  border-radius:14px;
}

.login-link{
  text-align:center;
  margin-top:18px;
}

.login-link a{
  color:#d63384;
  font-weight:600;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="auth-card">

  <div class="brand">BeautyHub ✨</div>
  <div class="sub">Create your beauty account</div>

{% if messages %}
  {% for message in messages %}
  <div class="alert alert-danger alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
{% endif %}

  <!-- Signup Form -->
  <form method="POST" action="{% url 'signup' %}">
  {% csrf_token %}

  <!-- Username -->
  <div class="form-group">
    <i class="bi bi-person"></i>
    <input type="text" name="username" required placeholder=" ">
    <label>Username</label>
  </div>

  <div class="form-group">
    <i class="bi bi-envelope"></i>
    <input type="email" name="email" required placeholder=" ">
    <label>Email</label>
  </div>

  <!-- Phone -->
  <div class="form-group">
    <i class="bi bi-phone"></i>
    
    <input type="tel" 
           id="phone"
           name="phone"
           required
           maxlength="10"
           placeholder=" "
           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    
    <label>Phone Number</label>
</div>

  <!-- Password -->
  <div class="form-group">
    <i class="bi bi-lock"></i>
    <input type="password" name="password1" required placeholder=" ">
    <label>Password</label>
  </div>

  <!-- Confirm Password -->
  <div class="form-group">
    <i class="bi bi-shield-lock"></i>
    <input type="password" name="password2" required placeholder=" ">
    <label>Confirm Password</label>
  </div>

  <button type="submit" class="btn btn-beauty w-100">
      Create Account
  </button>

  </form>

  <div class="login-link">
    Already have an account?
    <a href="{% url 'login' %}">Login</a>
  </div>

</div>

</body>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    let phone = document.getElementById("phone").value;

    if (phone.length !== 10) {
        alert("Enter 10 digit phone number");
        e.preventDefault();
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
