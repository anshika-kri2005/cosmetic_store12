<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Order</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #fef6f9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.track-box {
    max-width: 700px;
    margin: 60px auto;
    background: #ffffff;
    padding: 40px 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
}

.track-box h3 {
    text-align: center;
    margin-bottom: 30px;
    color: #ff1a66;
}

.order-info {
    text-align: center;
    margin-bottom: 40px;
    font-size: 1.1rem;
}

.progress-container {
    display: flex;
    justify-content: space-between;
    position: relative;
    margin-bottom: 30px;
}

.step {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 25%;
}

.step::before {
    content: '';
    position: absolute;
    top: 20px;
    left: 50%;
    height: 4px;
    width: 100%;
    background: #ddd;
    z-index: -1;
}

.step:first-child::before {
    left: 50%;
    width: 50%;
}

.step:last-child::before {
    width: 50%;
}

.step .icon {
    width: 50px;
    height: 50px;
    line-height: 50px;
    margin: auto;
    border-radius: 50%;
    background: #ddd;
    color: white;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.step.active .icon {
    background: #ff1a66;
    animation: pulse 1s infinite;
}

.step p {
    margin-top: 10px;
    font-weight: 500;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 rgba(255,26,102,0.5); }
    50% { box-shadow: 0 0 15px rgba(255,26,102,0.8); }
    100% { box-shadow: 0 0 0 rgba(255,26,102,0.5); }
}

@media(max-width: 576px){
    .progress-container{
        flex-direction: column;
        align-items: flex-start;
    }
    .step{
        width: 100%;
        display: flex;
        align-items: center;
        margin-bottom: 25px;
    }
    .step p{
        margin-top: 0;
        margin-left: 15px;
    }
}
</style>
</head>

<body>
<div class="track-box">
    <h3>📦 Track Your Order</h3>
    <div class="order-info">
        <p><strong>Order ID:</strong> #{{ order.id }}</p>
        <p><strong>Status:</strong> {{ order.status|title }}</p>
    </div>

   <div class="progress-container">

    <div class="step {% if order.status == 'pending' or order.status == 'packed' or order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}">
        <div class="icon"><i class="bi bi-card-text"></i></div>
        <p>Order Placed</p>
    </div>

    <div class="step {% if order.status == 'packed' or order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}">
        <div class="icon"><i class="bi bi-box-seam"></i></div>
        <p>Packed</p>
    </div>

    <div class="step {% if order.status == 'shipped' or order.status == 'delivered' %}active{% endif %}">
        <div class="icon"><i class="bi bi-truck"></i></div>
        <p>Shipped</p>
    </div>

    <div class="step {% if order.status == 'delivered' %}active{% endif %}">
        <div class="icon"><i class="bi bi-check2-circle"></i></div>
        <p>Delivered</p>
    </div>

</div>
</div>
</body>
</html>
