{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Shipping Address</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    background:#f5f7fa;
}
.card{
    border:none;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}
#map{
    height:250px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-lg-6">

<div class="card p-4">

<h3 class="text-center mb-4 text-danger">Shipping Address</h3>

<form method="post">
{% csrf_token %}

<input name="full_name" class="form-control mb-3" placeholder="Full Name" required>
<input name="phone" class="form-control mb-3" placeholder="Phone Number" required>

<input name="house_no" class="form-control mb-3" placeholder="House / Flat No" required>
<input id="street" name="street" class="form-control mb-3" placeholder="Street / Area" required>
<input name="landmark" class="form-control mb-3" placeholder="Landmark">

<input id="pincode" name="pincode" class="form-control mb-3" placeholder="Pincode" required>
<input id="district" name="district" class="form-control mb-3" placeholder="District" required>
<input id="state" name="state" class="form-control mb-3" placeholder="State" required>
<input id="country" name="country" class="form-control mb-3" placeholder="Country" required>

<button type="button" class="btn btn-outline-primary w-100 mb-3" onclick="getLocation()">
📍 Use My Location
</button>

<div id="map"></div>

<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">

<!-- ✅ UPDATED BUTTON -->
<button class="btn btn-danger w-100 mt-4">
💾 Save Address
</button>

</form>

</div>
</div>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

    var map = L.map('map').setView([28.6139, 77.2090], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var marker = L.marker([28.6139,77.2090],{draggable:true}).addTo(map);

    function fillAddress(lat,lng){
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
        .then(res=>res.json())
        .then(data=>{
            let a=data.address;

            document.getElementById("street").value = a.road || "";
            document.getElementById("district").value = a.city || a.town || "";
            document.getElementById("state").value = a.state || "";
            document.getElementById("country").value = a.country || "";
            document.getElementById("pincode").value = a.postcode || "";
        });
    }

    marker.on('dragend',function(){
        let pos=marker.getLatLng();
        document.getElementById("latitude").value=pos.lat;
        document.getElementById("longitude").value=pos.lng;
        fillAddress(pos.lat,pos.lng);
    });

    window.getLocation=function(){
        navigator.geolocation.getCurrentPosition(function(p){
            let lat=p.coords.latitude;
            let lng=p.coords.longitude;

            map.setView([lat,lng],15);
            marker.setLatLng([lat,lng]);

            document.getElementById("latitude").value=lat;
            document.getElementById("longitude").value=lng;

            fillAddress(lat,lng);
        });
    }

});
</script>

</body>
</html>
